<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual novel</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="styles/footer.css">
</head>

<body>
    <header>
        <a href="index.html"><img src="src/images/logo/logoBranca.png" alt="Logo"></a>
        <nav class="infos-header">
            <ul>
                <li><a href="/pages/lunetas.html">Lunetas</a></li>
                <li><a href="/pages/sobrenos.html">Sobre nós</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="jogo">
            <div id="cenario"></div>

            <div id="elementos-logo">

                <img src="src/images/animacoes/becker.png" id="becker">

                <img src="src/images/animacoes/ampulheta.png" id="ampulheta">

        </div>
            <div id="botoes-cena"></div>

            <div id="caixa-de-dialogo">

                <div class="conversa">
                    <div class="rosto-personagem">
                        <img src="src/images/caixa-de-dialogo/protagonista.jpg" alt="rosto-personagem">
                    </div>
                    <div class="falas-box">
                        <div class="falas">
                            <div id="falante"></div>
                            <div id="dialogo"></div>
                        </div>
                    </div>
                </div>

            </div>

            <div id="overlay">
                <img src="src/images/logo/logoPreta.png" alt="Logo do jogo">
                <form onsubmit="return false">
                    <label id="overlay_nome" for="nome">Digite o seu nome:</label>
                    <input type="text" id="nome-jogadora" placeholder="Digite o seu nome aqui">

                    <button id="comecar-btn" type="button">JOGAR</button>
                </form>

            </div>
        </div>
    </main>

    <footer>
        <a href="https://www.instagram.com/projetolunetas/" target="_blank" class="infos-footer" id="lunetas">
            <img src="src/images/footer/lunetas.png" alt="Logo Lunetas">
            <p>@projetolunetas</p>
        </a>
        <a href="https://www.instagram.com/smd_ufc/" target="_blank" class="infos-footer" id="smd">
            <img src="src/images/footer/smd.png" alt="Logo SMD">
            <p>@smd_ufc</p>
        </a>
        <a href="https://www.instagram.com/ufcvirtual/" target="_blank" class="infos-footer" id="iuiv">
            <img src="src/images/footer/iuiv.png" alt="Logo IUIV">
            <p>@ufcvirtual</p>
        </a>
    </footer>


    <script src="script.js"></script>
</body>

</html>
