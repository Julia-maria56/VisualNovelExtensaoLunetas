<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual novel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <a href="index.html"><img src="src/images/logo/logoBranca.png" alt="Logo"></a>
        <nav class="infos-header">
            <ul>
                <li><a href="">Lunetas</a></li>
                <li><a href="">Sobre nós</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="jogo">
            <div id="cenario"></div>
            <div id="botoes-cena"></div>

            <div id="caixa-de-dialogo">

                <div class="conversa">
                    <div class="rosto-personagem">
                        <img src="src/images/caixa-de-dialogo/protagonista.jpg" alt="">
                    </div>
                    <div class="falas-box">
                        <div class="falas">
                            <div id="falante"></div>
                            <div id="dialogo"></div>
                        </div>
                    </div>
                </div>

            </div>

            <div id="overlay">
                <img src="src/images/logo/logoPreta.png" alt="Logo do jogo">
                <form onsubmit="return false">
                    <label id="overlay_nome" for="nome">Digite o seu nome:</label>
                    <input type="text" id="nome-jogadora" placeholder="Digite o seu nome aqui">

                    <button id="comecar-btn" type="button">JOGAR</button>
                </form>

            </div>
        </div>
    </main>

    <footer>
        <div class="infos-footer" id="lunetas">
            <a href="https://www.instagram.com/projetolunetas/" target="_blank"><img src="src/images/footer/lunetas.png"
                    alt=""></a>
            <a href="https://www.instagram.com/projetolunetas/" target="_blank">@projetolunetas</a>
        </div>
        <div class="infos-footer" id="smd">
            <a href="https://www.instagram.com/smd_ufc/" target="_blank"><img src="src/images/footer/smd.png"
                    alt=""></a>
            <a href="https://www.instagram.com/smd_ufc/" target="_blank">@smd_ufc</a>
        </div>
        <div class="infos-footer" id="iuiv">
            <a href="https://www.instagram.com/ufcvirtual/" target="_blank"><img src="src/images/footer/iuiv.png"
                    alt=""></a>
            <a href="https://www.instagram.com/ufcvirtual/" target="_blank">@ufcvirtual</a>
        </div>
    </footer>


    <script src="script.js"></script>
</body>

</html>
